{% extends "base.html" %}

{% block content %}
<div class="flex-1 flex items-center justify-center bg-[#0F172A] overflow-hidden p-4">
    <div class="w-full max-w-md bg-[#1E293B] border border-slate-800 rounded p-6 shadow-xl flex flex-col gap-6">
        <div class="text-center">
            <h2 class="text-white text-xl font-bold tracking-tight mb-1">CLOSE REGISTER</h2>
            <p class="text-slate-400 text-[10px] uppercase font-mono tracking-wider">Session <span class="text-indigo-400">#{{ session.id }}</span></p>
        </div>

        <form method="POST" action="" class="flex flex-col gap-4">
            {% csrf_token %}
            
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Closing Float (Counted Cash)</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 font-mono text-sm">KES</span>
                    <input type="number" step="0.01" name="closing_float" id="closing_float" required
                           class="w-full bg-[#0F172A] border border-slate-700 text-white font-mono text-lg pl-12 pr-3 py-2 rounded focus:outline-none focus:border-rose-500 transition-colors">
                </div>
            </div>
            
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Discrepancy Notes (Optional)</label>
                <textarea name="notes" rows="2"
                          class="w-full bg-[#0F172A] border border-slate-700 text-white text-sm p-3 rounded focus:outline-none focus:border-rose-500 transition-colors placeholder-slate-600"
                          placeholder="e.g. Missing 50..."></textarea>
            </div>

            <button type="submit" class="mt-4 w-full h-10 bg-rose-600 hover:bg-rose-500 text-white rounded text-xs font-bold transition-colors">
                CLOSE & PRINT Z-REPORT
            </button>
        </form>
    </div>
</div>
{% endblock %}
