{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS System</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0F172A',
              panel: '#1E293B',
              border: '#1E293B', // Slate 800ish 
              slate: {
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
              }
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #0F172A; color: #cbd5e1; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
      /* Offline banner styles */
      #offline-banner { display: none; }
      body.offline #offline-banner { display: flex; }
    </style>
</head>
<body class="bg-[#0F172A] text-slate-300 flex flex-col font-sans overflow-hidden">
    <header class="h-12 border-b flex items-center px-4 justify-between bg-[#1E293B]" style="border-color: #1e293b;">
        <div class="flex items-center gap-4">
            <div class="w-6 h-6 bg-indigo-500 rounded flex items-center justify-center">
                <div class="w-3 h-3 bg-white rotate-45"></div>
            </div>
            <span class="font-bold text-white tracking-tight">KRA POS</span>
            <div class="h-4 w-[1px] bg-slate-700"></div>
            <span class="text-xs text-slate-400 font-mono">{% block branch_name %}Main Branch{% endblock %}</span>
        </div>
        <div class="flex items-center gap-6">
            <div id="offline-banner" class="hidden text-xs font-medium text-rose-500 gap-2 items-center">
                <div class="w-2 h-2 rounded-full bg-rose-500"></div>
                OFFLINE — <span id="pending-sales-count">0</span> PENDING
            </div>
            <div id="online-indicator" class="flex gap-4 text-xs font-medium items-center">
                <span class="text-emerald-400 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    ONLINE
                </span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs text-slate-400">{{ request.user.email }}</span>
                <div class="w-8 h-8 rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-xs font-bold">{{ request.user.email|first|upper }}</div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <nav class="w-14 border-r border-slate-800 bg-[#111827] flex flex-col items-center py-4 gap-6">
            <a href="{% url 'pos_checkout' %}" class="p-2 {% if request.resolver_match.url_name == 'pos_checkout' %}text-indigo-400 bg-indigo-500/10 rounded-lg{% else %}text-slate-500 hover:text-slate-300{% endif %}" title="Till">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </a>
            <a href="#" class="p-2 {% if 'product' in request.resolver_match.url_name %}text-indigo-400 bg-indigo-500/10 rounded-lg{% else %}text-slate-500 hover:text-slate-300{% endif %}" title="Products">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </a>
            <a href="#" class="p-2 text-slate-500 hover:text-slate-300" title="Reports">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </a>
            <a href="{% url 'session_close' %}" class="mt-auto p-2 text-slate-500 hover:text-slate-300" title="Close Session">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </a>
        </nav>
        
        <main class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Service Worker, Sync, and Context -->
    <script>
        // Offline tracking
        window.addEventListener('online', () => {
            document.body.classList.remove('offline');
            document.getElementById('online-indicator').classList.remove('hidden');
            document.getElementById('offline-banner').classList.add('hidden');
            if (typeof syncSales === 'function') syncSales();
        });
        window.addEventListener('offline', () => {
            document.body.classList.add('offline');
            document.getElementById('online-indicator').classList.add('hidden');
            document.getElementById('offline-banner').classList.remove('hidden');
        });
        
        if (!navigator.onLine) {
            document.body.classList.add('offline');
            document.getElementById('online-indicator').classList.add('hidden');
            document.getElementById('offline-banner').classList.remove('hidden');
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("{% static 'js/sw.js' %}")
                .then(reg => console.log('SW registered', reg))
                .catch(err => console.error('SW error', err));
        }
    </script>
    <script src="{% static 'js/sync.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
