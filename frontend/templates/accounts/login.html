{% extends "base_minimal.html" %}

{% block content %}
<form method="post" class="space-y-6">
    {% csrf_token %}
    
    {% if form.errors %}
    <div class="p-3 rounded-lg bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm text-center">
        Invalid email or password.
    </div>
    {% endif %}

    <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Email Address</label>
        <div class="relative">
            <input type="email" name="username" placeholder="admin@pos.com" required
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
        </div>
    </div>

    <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Password</label>
        <div class="relative">
            <input type="password" name="password" placeholder="••••••••" required
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
        </div>
    </div>

    <button type="submit" 
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-all active:scale-[0.98]">
        Sign In
    </button>
    
    <div class="text-center">
        <a href="#" class="text-xs text-slate-500 hover:text-indigo-400 transition-colors">Forgot your password?</a>
    </div>
</form>
{% endblock %}
