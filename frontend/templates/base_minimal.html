{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sajiir POS - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
            colors: {
              background: '#0F172A',
              panel: '#1E293B',
              accent: '#6366F1',
              slate: {
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
              }
            }
          }
        }
      }
    </script>
    <style>
      body { 
        background: radial-gradient(circle at top right, #1E1B4B, #0F172A); 
        color: #cbd5e1; 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
        margin: 0;
      }
      .glass {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
</head>
<body class="bg-[#0F172A] text-slate-300 font-sans">
    <div class="w-full max-w-md p-1 px-1">
        <div class="glass p-8 rounded-2xl shadow-2xl">
            <div class="flex flex-col items-center mb-8">
                <div class="w-12 h-12 bg-indigo-500 rounded-xl flex items-center justify-center mb-4 shadow-lg shadow-indigo-500/20">
                    <div class="w-6 h-6 bg-white rotate-45"></div>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Sajiir POS</h1>
                <p class="text-slate-400 text-sm">Next Generation Point of Sale</p>
            </div>
            
            {% block content %}{% endblock %}
        </div>
        <p class="text-center mt-8 text-slate-500 text-xs tracking-widest uppercase">Powered by Sajiir Technologies</p>
    </div>
</body>
</html>
